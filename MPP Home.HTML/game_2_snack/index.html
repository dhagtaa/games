<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Snack Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== LANDING PAGE ===== -->
<div id="landing" class="card">
    <h1>🐍 Snake Game</h1>

    <input type="text" id="playerName" placeholder="Masukkan nama pemain">

    <button onclick="startGame()">🎮 Mulai Game</button>

    <h3>📊 Riwayat Skor</h3>
    <ul id="scoreHistory"></ul>

    <button class="danger" onclick="resetHistory()">🗑 Reset Riwayat</button>
</div>

<!-- ===== GAME PAGE ===== -->
<div id="gamePage" style="display:none; position:relative;">
    <p>Player: <b id="playerLabel"></b></p>
    <p>Skor: <span id="score">0</span></p>

    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <!-- KONTROL PINDAH KE BAWAH (MELINGKAR) -->
    <div class="controls bottom-circle">
        <button onclick="setDirection('UP')">↑</button>
        <div>
            <button onclick="setDirection('LEFT')">←</button>
            <button onclick="setDirection('RIGHT')">→</button>
        </div>
        <button onclick="setDirection('DOWN')">↓</button>
    </div>
</div>

<!-- ================= AUDIO ================= -->
<audio id="bgm" src="audio.mp3" loop></audio>
<audio id="eatSound" src="orb.mp3"></audio>
<audio id="clickSound" src="nabrak.mp3"></audio>
<audio id="crashSound" src="nabrak.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
