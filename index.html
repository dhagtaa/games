<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Games Retro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONT RETRO -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            background: radial-gradient(circle at center, #0f0026, #000);
            color: #00fff7;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(#00fff733 1px, transparent 1px),
                        linear-gradient(90deg, #00fff733 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        header {
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        header span {
            color: #00fff7;
        }

        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 10px #00fff7;
        }

        .hero p {
            margin-bottom: 30px;
            font-size: 10px;
        }

        .btn {
            padding: 12px 20px;
            border: 2px solid #00fff7;
            background: transparent;
            color: #00fff7;
            cursor: pointer;
            margin: 5px;
            text-decoration: none;
            font-size: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #00fff7;
            color: black;
            box-shadow: 0 0 10px #00fff7;
        }

        .games {
            padding: 60px 10%;
            text-align: center;
        }

        .games h2 {
            margin-bottom: 30px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 20px;
        }

        .card {
            border: 2px solid #00fff7;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00fff7;
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 12px;
        }

        .card p {
            font-size: 9px;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: black;
            color: #00fff7;
            border-top: 2px solid #00fff7;
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: black;
            color: #00fff7;
            border: 2px solid #00fff7;
            padding: 10px;
            cursor: pointer;
        }

        .music-btn:hover {
            box-shadow: 0 0 10px #00fff7;
        }
    </style>
</head>

<body>

<header>
    <h1>Mini <span>Games</span></h1>
</header>

<section class="hero">
    <h2>WELCOME PLAYER 🎮</h2>
    <p>SELECT YOUR GAME</p>

    <div>
        <a href="#game" class="btn">START</a>
        <a href="#" class="btn">INFO</a>
    </div>
</section>

<section class="games" id="game">
    <h2>GAME LIST</h2>

    <div class="cards">
        <div class="card">
            <h3>SNAKE GAME</h3>
            <p>GET THE HIGHEST SCORE!</p>
            <a href="../MPP HOME.HTML/game_2_snack/index.html" class="btn">PLAY</a>
        </div>

        <div class="card">
            <h3>TIC TAC TOE</h3>
            <p>PLAY WITH FRIEND!</p>
            <a href="../MPP HOME.HTML/game_1_XOX/index.html" class="btn">PLAY</a>
        </div>
    </div>
</section>

<footer>
    © 2026 MINI GAMES 👾
</footer>

<!-- AUDIO (FIXED) -->
<audio id="music" loop autoplay muted>
    <source src="PICA PICA - Juan Reza.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btnMusic">🎵 ON</button>

<script>
    const music = document.getElementById("music");
    const btn = document.getElementById("btnMusic");

    // Aktif saat pertama kali user klik
    document.addEventListener("click", () => {
        music.muted = false;
        music.play();
    }, { once: true });

    function toggleMusic() {
        if (music.paused) {
            music.play();
            btn.innerText = "🎵 ON";
        } else {
            music.pause();
            btn.innerText = "🔇 OFF";
        }
    }
</script>

</body>
</html>
